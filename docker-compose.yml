services:
  ads-dashboard:
    build: .
    container_name: ads-dashboard
    ports:
      - "8501:8501"
    env_file:
      - path: .env
        required: false
    environment:
      STREAMLIT_SERVER_ADDRESS: 0.0.0.0
      STREAMLIT_SERVER_PORT: 8501
    user: "0:0"
    volumes:
      - ./data:/app/data
    restart: unless-stopped
